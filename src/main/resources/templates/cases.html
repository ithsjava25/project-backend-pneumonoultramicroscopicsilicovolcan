<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cases</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="durtre-shell">

    <header class="topbar">
        <div class="brand">
            <img th:src="@{/images/police-logo-color.png}"
                 alt="Polislogga"
                 class="brand-logo">

            <div class="brand-text">
                <div class="brand-title-row">
                    <span class="brand-title">DurTre</span>
                    <span class="brand-subtitle">Polismyndigheten</span>
                </div>
                <span class="brand-tagline">Utredningsöversikt</span>
            </div>
        </div>

        <div class="topbar-user">
            <span class="user-chip" th:text="${currentUser.getFullName()}" th:onclick="location.href='/profile'"
                  style="cursor: pointer"></span>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="cursor: pointer;" class="user-chip">Logga ut</button>
            </form>
        </div>
    </header>
    <div class="meta-strip">
        <span>Inloggad som: <strong th:text="${currentUser.getUsername()}"></strong></span>
        <span>Roll: <strong th:text="${currentUser.getProfession()}"></strong></span>
        <span>Avdelning: <strong th:text="${currentUser.getDepartment()}"></strong></span>
        <span>Aktiv databas: <strong>TESTMILJÖ</strong></span>
        <span>Senast uppdaterad: <strong>2026-03-14 10:03</strong></span>

    </div>

    <div>
        <h2>Tilldela polis till öppna fall</h2>
        <div th:if="${allUnsignedCases.size() > 0}">
            <span th:text="|Antal fall utan designerad polis: ${allUnsignedCases.size()}|"></span>
        </div>
        <table>
            <thead>
            <tr>
                <th>K-Nummer</th>
                <th>Status</th>
                <th>Utredare</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="case : ${allcases}">
                <td th:text="${case.getCaseNumber()}"></td>
                <td th:text="${case.getStatus()}"></td>
                <td>
                    <ul>
                        <li th:each="police : ${case.getAccounts()}">
                            <span th:text="${police.getFullName()}"> </span>
                        </li>
                    </ul>
                </td>
                <td>
                    <form method="post" th:action="@{/cases/add}" style="display: flex">
                        <input type="hidden" name="case_number" th:value="${case.getCaseNumber()}">
                        <select name="addAccountId" required>
                            <option value="" disabled selected hidden>Välj en anställd</option>
                            <option th:each="accounts : ${allAccounts}"
                                    th:value="${accounts.getId()}"
                                    th:text="${accounts.getFullName()}">

                            </option>
                        </select>
                        <button type="submit">Tilldela/Avlägsna</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
