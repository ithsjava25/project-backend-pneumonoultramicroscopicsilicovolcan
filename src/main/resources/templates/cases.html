<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cases</title>
</head>
<body>
<h1>Sök ärenden per användare</h1>

<form method="get" action="/cases">
    <label for="accountId">Account ID</label>
    <input id="accountId" type="number" name="accountId" th:value="${accountId}">
    <button type="submit">Sök</button>
</form>

<div th:if="${cases}">
    <h2>Ärenden</h2>
    <table>
        <thead>
        <tr>
            <th>K-nummer</th>
            <th>Filer</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${cases}">
            <td th:text="${c.caseNumber}"></td>
            <td>
                <div th:each="ev : ${evidenceMap[c.caseNumber]}">
                    <a th:href="@{/evidence/{id}/pdf(id=${ev.id})}">Ladda ner PDF</a>
                    <a th:if="${ev.s3KeyFile != null}" th:href="@{/evidence/{id}/file(id=${ev.id})}"
                       th:text="'Ladda ner ' + ${ev.originalFilename}"></a>
                </div>
                <span th:if="${#lists.isEmpty(evidenceMap[c.caseNumber])}">Inga filer uppladdade</span>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(cases)}">Inga ärenden hittades.</p>
</div>
<br/>
<div>
    <h2>Lägg till konto till case</h2>
    <form method="post" th:action="@{/cases/add}">
        <label for="add_accountId">Account ID</label>
        <input id="add_accountId" type="number" name="addAccountId" th:value="${addAccountId}">
        <label for="case_number">Case number</label>
        <input id="case_number" type="text" name="case_number" th:value="${case_number}">
        <button type="submit">Lägg till behörighet</button>
    </form>
</div>
</body>
</html>
