<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Här kan bara användare med rollen Admin lägga till raporter</h1>
<form th:action="@{/reports/add}" th:object="${newReport}" method="post" enctype="multipart/form-data">
    <label for="reason">Brottstyp</label>
    <input id="reason" th:field="*{event}">
    <span th:if="${#fields.hasErrors('event')}" th:errors="*{event}"></span><br/>

    <label for="name">Namn</label>
    <input id="name" th:field="*{name}">
    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span><br/>

    <label for="case">K-Nummer</label>
    <input id="case" th:field="*{caseNumber}">
    <span th:if="${#fields.hasErrors('caseNumber')}" th:errors="*{caseNumber}"></span><br/>

    <label for="file">Bifoga fil</label>
    <input id="file" type="file" name="file"><br/>

    <button type="submit">Spara</button>
    <button type="reset">Avbryt</button>
</form>
<a href="/userpage">Gå till använar sida</a>
</body>
</html>
