<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DurTre - Konto</title>
    <link rel="stylesheet" th:href="@{/style.css}">

</head>
<body>
<div class="durtre-shell">

    <header class="topbar">
        <div class="brand">
            <img th:src="@{/images/police-logo-color.png}"
                 alt="Polislogga"
                 class="brand-logo">

            <div class="brand-text">
                <div class="brand-title-row">
                    <span class="brand-title">DurTre</span>
                    <span class="brand-subtitle">Polismyndigheten</span>
                </div>
                <span class="brand-tagline">Skapa Konto</span>
            </div>
        </div>

        <div class="topbar-user">
            <div th:if="${accountoverview}">
                <form th:action="@{/accounts}" method="get">
                    <button class="user-chip" type="submit" style="cursor: pointer">Konto översikt</button>
                </form>
            </div>
            <div th:if="${assigncasebutton}">
                <form th:action="@{/cases}" method="get">
                    <button class="user-chip" type="submit" style="cursor: pointer">Tilldelning</button>
                </form>
            </div>
            <span class="user-chip" th:text="${currentUser.getFullName()}" th:onclick="location.href='/profile'"
                  style="cursor: pointer"></span>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="cursor: pointer;" class="user-chip">Logga ut</button>
            </form>
        </div>
    </header>
    <div class="meta-strip">
        <span>Inloggad som: <strong th:text="${currentUser.getUsername()}"></strong></span>
        <span>Roll: <strong th:text="${currentUser.getProfession()}"></strong></span>
        <span>Avdelning: <strong th:text="${currentUser.getDepartment()}"></strong></span>
        <span>Aktiv databas: <strong>TESTMILJÖ</strong></span>
        <span>Senast uppdaterad: <strong>2026-03-14 10:03</strong></span>

        <button th:onclick="location.href='/reports'" class="btn btn-primary meta-strip-button">
            Registrera ärende
        </button>
    </div>

    <main class="page-wrap">
        <form th:object="${createAccount}" class="report-form" th:action="@{/accounts/add}" method="post">

            <div class="report-grid">

                <div class="report-column">
                    <section class="card">
                        <div class="card-header">
                            <div>
                                <span class="card-kicker">Person uppgifter</span>
                            </div>
                        </div>

                        <div class="field-grid">
                            <div class="form-field">
                                <label for="fullname">Namn</label>
                                <input id="fullname"
                                       th:field="*{fullName}"
                                       type="text"
                                       placeholder="Ange för- och efternamn">
                                <div>
                                    <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
                                </div>
                            </div>

                            <div class="form-field">
                                <label for="userName">Användarnamn</label>
                                <input id="userName"
                                       type="text"
                                       th:field="*{username}"
                                       placeholder="Ange användarnamn">
                                <div>
                                    <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                                </div>
                            </div>
                            <div class="form-field">
                                <label for="passWord">Lösenord</label>
                                <input id="passWord"
                                       type="password"
                                       th:field="*{password}"
                                       placeholder="Ange tillfälligt lösenord">
                                <div>
                                    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="report-column">
                    <section class="card">
                        <div class="card-header">
                            <div>
                                <span class="card-kicker">Anställning</span>
                            </div>
                        </div>

                        <div class="field-grid two-columns">
                            <div class="form-field">
                                <label for="Profession">Roll</label>
                                <input id="Profession"
                                       type="text"
                                       th:field="*{profession}"
                                       placeholder="Ange rollen till kontot (Polis, Chef)">
                                <div>
                                    <span th:if="${#fields.hasErrors('profession')}" th:errors="*{profession}"></span>
                                </div>
                            </div>

                            <div class="form-field">
                                <label for="Department">Avdelning</label>
                                <input id="Department"
                                       type="text"
                                       th:field="*{department}"
                                       placeholder="Anställnings område">
                                <div>
                                    <span th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="card">
                        <div class="card-header">
                            <div>
                                <span class="card-kicker">Behörighet</span>
                            </div>
                        </div>

                        <div class="form-field">
                            <label for="Roles">Behörigheter</label>
                            <input id="Roles"
                                   type="text"
                                   th:field="*{roles}"
                                   placeholder="Personens roller (user, admin, handler)">
                            <div>
                                <span th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}" class="error"></span>
                            </div>
                            <button type="submit" class="btn btn-primary meta-strip-button">Spara</button>
                        </div>
                    </section>
                </div>

            </div>
        </form>
    </main>
</div>
</body>
</html>
